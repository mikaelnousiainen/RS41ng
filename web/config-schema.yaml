_schema_version: "2.0"

# ==============================================================================
# Radiosonde Firmware Configurator — Config Schema
#
# This schema is the single source of truth for:
#   - The web configurator UI (field rendering, validation, visibility)
#   - The Python config generator (scripts/generate_config.py)
#   - The TypeScript config generators (browser-side)
#
# Every user-configurable #define in src/config.h and every message template
# array in src/config.c has a corresponding entry here.
#
# Field metadata keys:
#   define          - C preprocessor symbol name
#   define_style    - "value" (default) or "toggle" (comment/uncomment style)
#   type            - string | bool | integer | hex | frequency | char | enum_constant | string_array
#   suffix          - Optional C literal suffix (e.g. "UL")
#   default         - Default value
#   label           - Human-readable label
#   description     - Help text
#   tier            - simple | intermediate | advanced
#   visible_when    - Expression for conditional visibility
#   validation      - Validation rules (min, max, max_length, pattern, required)
#   alias_of        - If this define should reference another define (e.g. APRS_CALLSIGN = CALLSIGN)
#   file            - "config.h" (default) or "config.c"
#   values          - For enum/enum_constant: list of {value, label}
#   template_vars   - true if field supports $cs, $loc6, etc. template variables
# ==============================================================================

# ------------------------------------------------------------------------------
# Conflict rules
# These are evaluated against the full config state to detect invalid combinations
# ------------------------------------------------------------------------------
conflicts:
  - id: gps_nmea_vs_i2c
    message: "GPS NMEA output cannot be enabled simultaneously with I2C bus sensors or Si5351"
    condition: "gps.nmea_output_enable && (sensors.bmp280_enable || sensors.si5351_enable)"

  - id: pulse_counter_vs_peripherals
    message: "Pulse counter conflicts with GPS NMEA output, I2C bus sensors, and Si5351"
    condition: "sensors.pulse_counter_enable && (gps.nmea_output_enable || sensors.si5351_enable || sensors.bmp280_enable || sensors.bme68x_enable || sensors.bme690_enable)"

  - id: horus_v2_v3_continuous
    message: "Continuous TX: only Horus V2 or V3 can be continuous, not both"
    condition: "tx_modes.radio_tx_horus_v2_continuous && tx_modes.radio_tx_horus_v3_continuous"

# ==============================================================================
# SECTIONS
# ==============================================================================

# ------------------------------------------------------------------------------
# Hardware Selection
# ------------------------------------------------------------------------------
hardware:
  _section: "Hardware Selection"
  _description: "Select your radiosonde hardware type"
  _tier: simple
  _order: 0

  type:
    define: "RS41"
    define_style: toggle
    label: "Hardware Type"
    description: >
      Select your radiosonde hardware. RS41_RSM4x4 is for newer RS41 PCB revisions
      (RSM4x4/4x5, STM32L412-series). DFM-17 support is experimental and requires
      GPS lock to calibrate its internal oscillator.
    type: enum
    values:
      - { value: "RS41", label: "Vaisala RS41" }
      - { value: "RS41_RSM4x4", label: "Vaisala RS41 RSM4x4/4x5 (newer PCB)" }
      - { value: "DFM17", label: "Graw DFM-17 (experimental)" }
    default: "RS41"
    tier: simple

# ------------------------------------------------------------------------------
# TX Modes (generic radio layer)
# ------------------------------------------------------------------------------
tx_modes:
  _section: "Transmit Modes"
  _description: "Enable/disable transmission modes, set frequencies and repeat counts"
  _tier: simple
  _order: 1

  post_transmit_delay_ms:
    define: RADIO_POST_TRANSMIT_DELAY_MS
    label: "Post-Transmit Delay (ms)"
    description: "Delay after transmission for modes without time sync. Zero enables continuous transmit for Horus. Max 200000 ms."
    type: integer
    default: 500
    tier: intermediate
    validation:
      min: 0
      max: 200000

  time_sync_threshold_ms:
    define: RADIO_TIME_SYNC_THRESHOLD_MS
    label: "Time Sync Threshold (ms)"
    description: "How far from scheduled time a time-synced transmission is still allowed"
    type: integer
    default: 2000
    tier: advanced
    validation:
      min: 100
      max: 30000

  # --- CW ---
  radio_tx_cw:
    define: RADIO_TX_CW
    label: "Enable CW"
    description: "Morse code transmission"
    type: bool
    default: false
    tier: simple

  radio_tx_cw_count:
    define: RADIO_TX_CW_COUNT
    label: "CW Repeat Count"
    type: integer
    default: 1
    tier: simple
    visible_when: "tx_modes.radio_tx_cw"
    validation:
      min: 1
      max: 50

  # --- Pip ---
  radio_tx_pip:
    define: RADIO_TX_PIP
    label: "Enable Pip"
    description: "Short beep to indicate transmitter presence"
    type: bool
    default: false
    tier: simple

  radio_tx_pip_count:
    define: RADIO_TX_PIP_COUNT
    label: "Pip Repeat Count"
    type: integer
    default: 6
    tier: simple
    visible_when: "tx_modes.radio_tx_pip"
    validation:
      min: 1
      max: 50

  # --- APRS 1200 ---
  radio_tx_aprs:
    define: RADIO_TX_APRS
    label: "Enable APRS (1200 baud)"
    description: "APRS 1200 baud position reporting"
    type: bool
    default: false
    tier: simple

  radio_tx_aprs_count:
    define: RADIO_TX_APRS_COUNT
    label: "APRS Repeat Count"
    type: integer
    default: 1
    tier: simple
    visible_when: "tx_modes.radio_tx_aprs"
    validation:
      min: 1
      max: 50

  # --- APRS 9600 ---
  radio_tx_aprs_9600:
    define: RADIO_TX_APRS_9600
    label: "Enable APRS (9600 baud)"
    description: "APRS 9600 baud position reporting"
    type: bool
    default: false
    tier: simple

  radio_tx_aprs_9600_count:
    define: RADIO_TX_APRS_9600_COUNT
    label: "APRS 9600 Repeat Count"
    type: integer
    default: 1
    tier: simple
    visible_when: "tx_modes.radio_tx_aprs_9600"
    validation:
      min: 1
      max: 50

  # --- Horus V2 ---
  radio_tx_horus_v2:
    define: RADIO_TX_HORUS_V2
    label: "Enable Horus V2"
    description: "Horus 4FSK V2 digital mode (deprecated, use V3)"
    type: bool
    default: false
    tier: simple

  radio_tx_horus_v2_count:
    define: RADIO_TX_HORUS_V2_COUNT
    label: "Horus V2 Repeat Count"
    type: integer
    default: 1
    tier: simple
    visible_when: "tx_modes.radio_tx_horus_v2"
    validation:
      min: 1
      max: 50

  # --- Horus V3 ---
  radio_tx_horus_v3:
    define: RADIO_TX_HORUS_V3
    label: "Enable Horus V3"
    description: "Horus 4FSK V3 digital mode. Recommended primary mode. Use Horus GUI or WebHorus for reception."
    type: bool
    default: true
    tier: simple

  radio_tx_horus_v3_count:
    define: RADIO_TX_HORUS_V3_COUNT
    label: "Horus V3 Repeat Count"
    type: integer
    default: 5
    tier: simple
    visible_when: "tx_modes.radio_tx_horus_v3"
    validation:
      min: 1
      max: 50

  # --- CATS ---
  radio_tx_cats:
    define: RADIO_TX_CATS
    label: "Enable CATS"
    description: "CATS digital mode -- rapid beacon rate, high channel capacity"
    type: bool
    default: false
    tier: simple

  radio_tx_cats_count:
    define: RADIO_TX_CATS_COUNT
    label: "CATS Repeat Count"
    type: integer
    default: 1
    tier: simple
    visible_when: "tx_modes.radio_tx_cats"
    validation:
      min: 1
      max: 50

  # --- Long Tone ---
  radio_tx_long_tone:
    define: RADIO_TX_LONG_TONE
    label: "Enable Long Tone"
    description: "Transmit a long continuous tone"
    type: bool
    default: false
    tier: intermediate

  radio_tx_long_tone_count:
    define: RADIO_TX_LONG_TONE_COUNT
    label: "Long Tone Repeat Count"
    type: integer
    default: 1
    tier: intermediate
    visible_when: "tx_modes.radio_tx_long_tone"
    validation:
      min: 1
      max: 50

  radio_tx_long_tone_duration_seconds:
    define: RADIO_TX_LONG_TONE_DURATION_SECONDS
    label: "Long Tone Duration (s)"
    description: "Duration of long tone transmission in seconds"
    type: integer
    default: 10
    tier: intermediate
    visible_when: "tx_modes.radio_tx_long_tone"
    validation:
      min: 1
      max: 600

  # --- Continuous modes ---
  radio_tx_horus_v2_continuous:
    define: RADIO_TX_HORUS_V2_CONTINUOUS
    label: "Horus V2 Continuous TX"
    description: "Continuous 4FSK preamble between transmissions. Disables all other modes. Mutually exclusive with V3 continuous."
    type: bool
    default: false
    tier: intermediate
    visible_when: "tx_modes.radio_tx_horus_v2"

  radio_tx_horus_v3_continuous:
    define: RADIO_TX_HORUS_V3_CONTINUOUS
    label: "Horus V3 Continuous TX"
    description: "Continuous 4FSK preamble between transmissions. Disables all other modes. Mutually exclusive with V2 continuous."
    type: bool
    default: false
    tier: intermediate
    visible_when: "tx_modes.radio_tx_horus_v3"

  # --- Frequencies ---
  radio_tx_frequency_cw:
    define: RADIO_TX_FREQUENCY_CW
    label: "CW Frequency (Hz)"
    group: "Transmit Frequencies"
    type: frequency
    default: 432501000
    tier: simple
    visible_when: "tx_modes.radio_tx_cw"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_pip:
    define: RADIO_TX_FREQUENCY_PIP
    label: "Pip Frequency (Hz)"
    group: "Transmit Frequencies"
    type: frequency
    default: 432501000
    tier: simple
    visible_when: "tx_modes.radio_tx_pip"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_aprs_1200:
    define: RADIO_TX_FREQUENCY_APRS_1200
    label: "APRS 1200 Frequency (Hz)"
    group: "Transmit Frequencies"
    type: frequency
    default: 432500000
    tier: simple
    visible_when: "tx_modes.radio_tx_aprs"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_aprs_9600:
    define: RADIO_TX_FREQUENCY_APRS_9600
    label: "APRS 9600 Frequency (Hz)"
    group: "Transmit Frequencies"
    type: frequency
    default: 432500000
    tier: simple
    visible_when: "tx_modes.radio_tx_aprs_9600"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_horus_v2:
    define: RADIO_TX_FREQUENCY_HORUS_V2
    label: "Horus V2 Frequency (Hz)"
    description: "Use a frequency offset to place FSK tones slightly above the defined frequency for SSB reception"
    group: "Transmit Frequencies"
    type: frequency
    default: 432501000
    tier: simple
    visible_when: "tx_modes.radio_tx_horus_v2"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_horus_v3:
    define: RADIO_TX_FREQUENCY_HORUS_V3
    label: "Horus V3 Frequency (Hz)"
    description: "Use a frequency offset to place FSK tones slightly above the defined frequency for SSB reception"
    group: "Transmit Frequencies"
    type: frequency
    default: 432501000
    tier: simple
    visible_when: "tx_modes.radio_tx_horus_v3"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_cats:
    define: RADIO_TX_FREQUENCY_CATS
    label: "CATS Frequency (Hz)"
    group: "Transmit Frequencies"
    type: frequency
    default: 434100000
    tier: simple
    visible_when: "tx_modes.radio_tx_cats"
    validation:
      min: 100000000
      max: 1000000000

  radio_tx_frequency_long_tone:
    define: RADIO_TX_FREQUENCY_LONG_TONE
    label: "Long Tone Frequency (Hz)"
    group: "Transmit Frequencies"
    type: frequency
    default: 432501000
    tier: intermediate
    visible_when: "tx_modes.radio_tx_long_tone"
    validation:
      min: 100000000
      max: 1000000000

  # --- GPS lock requirement ---
  radio_tx_wait_for_gps_lock:
    define: RADIO_TX_WAIT_FOR_GPS_LOCK
    label: "Wait for GPS Lock Before TX"
    description: "Require GPS fix before first transmission. Losing lock after initial fix will not prevent TX."
    type: bool
    default: false
    tier: intermediate

# ------------------------------------------------------------------------------
# Fox Mode
# ------------------------------------------------------------------------------
fox_mode:
  _section: "Fox Mode"
  _description: "Fox hunting / transmitter hunting mode. Disables GPS and follows transmit scheme."
  _tier: intermediate
  _order: 2

  enable_fox_mode:
    define: ENABLE_FOX_MODE
    label: "Enable Fox Mode"
    description: "Disables GPS and follows transmit scheme. Use RADIO_POST_TRANSMIT_DELAY_MS for wait periods. Use CW, PIP and LONG_TONE settings."
    type: bool
    default: false
    tier: intermediate

  enable_fm_cw:
    define: ENABLE_FM_CW
    label: "Enable FM CW"
    description: "Change CW modes (CW, PIP, LONG_TONE) to be FM modulated"
    type: bool
    default: false
    tier: intermediate
    visible_when: "fox_mode.enable_fox_mode"

  fm_cw_tx_delay:
    define: FM_CW_TX_DELAY
    label: "FM CW TX Delay (ms)"
    description: "Delay in ms for FM CW transmit"
    type: integer
    default: 500
    tier: intermediate
    visible_when: "fox_mode.enable_fm_cw"
    validation:
      min: 0
      max: 10000

  fm_tone_freq:
    define: FM_TONE_FREQ
    label: "FM Tone Frequency (Hz)"
    description: "Frequency in Hz of FM CW tone"
    type: integer
    default: 1000
    tier: intermediate
    visible_when: "fox_mode.enable_fm_cw"
    validation:
      min: 100
      max: 5000

# ------------------------------------------------------------------------------
# Global Configuration
# ------------------------------------------------------------------------------
global:
  _section: "Callsign & Basics"
  _description: "Core settings for your tracker"
  _tier: simple
  _order: 3

  callsign:
    define: CALLSIGN
    label: "Call Sign"
    description: "Your amateur radio call sign (max 6 characters)"
    type: string
    default: "N0CALL"
    tier: simple
    validation:
      required: true
      max_length: 6
      pattern: "^[A-Z0-9]+$"

  leds_enable:
    define: LEDS_ENABLE
    label: "Enable LEDs"
    description: >
      Red LED: lit during initialization and transmit.
      Green LED: blinks fast with no GPS fix, slowly with fix.
      Disabling saves power.
    type: bool
    default: true
    tier: intermediate

  leds_disable_altitude_meters:
    define: LEDS_DISABLE_ALTITUDE_METERS
    label: "Disable LEDs Above Altitude (m)"
    description: "Disable LEDs above this altitude to save power. Set to 0 to keep LEDs always on."
    type: integer
    default: 2000
    tier: intermediate
    validation:
      min: 0
      max: 50000

  allow_power_off:
    define: ALLOW_POWER_OFF
    label: "Allow Power Off via Button"
    description: "Allow powering off the sonde by pressing the button for over a second (when not transmitting)"
    type: bool
    default: false
    tier: intermediate

  locator_pair_count:
    define: LOCATOR_PAIR_COUNT_FULL
    label: "Locator Pair Count"
    description: "Number of character pairs in Maidenhead locator (max 6 = 12 chars)"
    type: integer
    default: 6
    tier: advanced
    validation:
      min: 1
      max: 6

# ------------------------------------------------------------------------------
# Si4032 Radio (RS41) — TX power only
# ------------------------------------------------------------------------------
radio_si4032:
  _section: "Si4032 Radio (RS41)"
  _description: "Built-in Si4032 transmitter configuration"
  _tier: simple
  _order: 4
  _visible_when: "hardware.type == 'RS41' || hardware.type == 'RS41_RSM4x4'"

  tx_power:
    define: RADIO_SI4032_TX_POWER
    label: "TX Power"
    description: >
      0=-1dBm, 1=2dBm, 2=5dBm (~3mW), 3=8dBm (~6mW),
      4=11dBm (~12mW), 5=14dBm (25mW), 6=17dBm (50mW), 7=20dBm (100mW).
      Default 5 (14 dBm, 25mW) is good for Horus 4FSK. Use 7 for APRS. Higher power reduces battery life.
    type: integer
    default: 5
    tier: simple
    validation:
      min: 0
      max: 7

# ------------------------------------------------------------------------------
# Si4063 Radio (DFM-17) — TX power + DFM-specific settings
# ------------------------------------------------------------------------------
radio_si4063:
  _section: "Si4063 Radio (DFM-17)"
  _description: "Built-in Si4063 transmitter configuration"
  _tier: simple
  _order: 5
  _visible_when: "hardware.type == 'DFM17'"

  tx_power:
    define: RADIO_SI4063_TX_POWER
    label: "TX Power"
    description: >
      Si4063 transmit power level: 0-127.
      7=0dBm, 10=3.3dBm, 14=6.2dBm, 22=10.2dBm,
      32=13.2dBm (recommended), 48=16.7dBm, 80=20.1dBm, 127=21.5dBm.
    type: integer
    default: 32
    tier: simple
    validation:
      min: 0
      max: 127

  tx_correct:
    define: RADIO_SI4063_TX_CORRECT
    label: "Crystal Capacitance Correction"
    description: "Use crystal capacitance LUT to better maintain frequency stability over temperature. Recommended for temperature below 0C."
    type: bool
    default: true
    tier: intermediate

  tx_dfm_additional_telem:
    define: TX_DFM_ADDITIONAL_TELEM
    label: "DFM Additional Telemetry"
    description: "Append processor and crystal capacitance values to Horus V3 telemetry"
    type: bool
    default: true
    tier: intermediate

  dfm17_usart_ext_port:
    define: DFM17_USART_EXT_PORT
    label: "DFM17 External USART Port"
    description: >
      Select USART for external serial output on DFM17.
      USART1 (PA9/PA10 on Mini-USB header) is recommended as it does not share pins with I2C bus.
      USART3 (PB10/PB11 on 4-pin PCB header) shares pins with I2C.
    type: enum_constant
    values:
      - { value: 1, label: "1 - USART1 (PA9/PA10, recommended)" }
      - { value: 3, label: "3 - USART3 (PB10/PB11, conflicts with I2C)" }
    default: 1
    tier: advanced
    visible_when: "gps.nmea_output_enable"

# ------------------------------------------------------------------------------
# Si5351 HF Radio (RS41 only) — TX power + mode enables
# ------------------------------------------------------------------------------
radio_si5351:
  _section: "Si5351 HF Radio"
  _description: "External Si5351 clock generator for HF transmissions (RS41 only)"
  _tier: advanced
  _order: 6
  _visible_when: "(hardware.type == 'RS41' || hardware.type == 'RS41_RSM4x4') && sensors.si5351_enable"

  tx_power:
    define: RADIO_SI5351_TX_POWER
    label: "TX Power (Drive Strength)"
    description: "0=2mA, 1=4mA, 2=6mA, 3=8mA"
    type: integer
    default: 3
    tier: advanced
    validation:
      min: 0
      max: 3

  # --- Mode enables ---
  tx_cw:
    define: RADIO_SI5351_TX_CW
    label: "Enable CW"
    type: bool
    default: true
    tier: advanced

  tx_cw_count:
    define: RADIO_SI5351_TX_CW_COUNT
    label: "CW Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_cw"
    validation:
      min: 1
      max: 50

  tx_pip:
    define: RADIO_SI5351_TX_PIP
    label: "Enable Pip"
    type: bool
    default: false
    tier: advanced

  tx_pip_count:
    define: RADIO_SI5351_TX_PIP_COUNT
    label: "Pip Repeat Count"
    type: integer
    default: 6
    tier: advanced
    visible_when: "radio_si5351.tx_pip"
    validation:
      min: 1
      max: 50

  tx_horus_v2:
    define: RADIO_SI5351_TX_HORUS_V2
    label: "Enable Horus V2"
    type: bool
    default: false
    tier: advanced

  tx_horus_v2_count:
    define: RADIO_SI5351_TX_HORUS_V2_COUNT
    label: "Horus V2 Repeat Count"
    type: integer
    default: 4
    tier: advanced
    visible_when: "radio_si5351.tx_horus_v2"
    validation:
      min: 1
      max: 50

  tx_horus_v3:
    define: RADIO_SI5351_TX_HORUS_V3
    label: "Enable Horus V3"
    type: bool
    default: true
    tier: advanced

  tx_horus_v3_count:
    define: RADIO_SI5351_TX_HORUS_V3_COUNT
    label: "Horus V3 Repeat Count"
    type: integer
    default: 4
    tier: advanced
    visible_when: "radio_si5351.tx_horus_v3"
    validation:
      min: 1
      max: 50

  tx_jt9:
    define: RADIO_SI5351_TX_JT9
    label: "Enable JT9"
    type: bool
    default: false
    tier: advanced

  tx_jt9_count:
    define: RADIO_SI5351_TX_JT9_COUNT
    label: "JT9 Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_jt9"
    validation:
      min: 1
      max: 50

  tx_jt65:
    define: RADIO_SI5351_TX_JT65
    label: "Enable JT65"
    type: bool
    default: false
    tier: advanced

  tx_jt65_count:
    define: RADIO_SI5351_TX_JT65_COUNT
    label: "JT65 Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_jt65"
    validation:
      min: 1
      max: 50

  tx_jt4:
    define: RADIO_SI5351_TX_JT4
    label: "Enable JT4"
    type: bool
    default: false
    tier: advanced

  tx_jt4_count:
    define: RADIO_SI5351_TX_JT4_COUNT
    label: "JT4 Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_jt4"
    validation:
      min: 1
      max: 50

  tx_wspr:
    define: RADIO_SI5351_TX_WSPR
    label: "Enable WSPR"
    type: bool
    default: false
    tier: advanced

  tx_wspr_count:
    define: RADIO_SI5351_TX_WSPR_COUNT
    label: "WSPR Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_wspr"
    validation:
      min: 1
      max: 50

  tx_fsq:
    define: RADIO_SI5351_TX_FSQ
    label: "Enable FSQ"
    type: bool
    default: false
    tier: advanced

  tx_fsq_count:
    define: RADIO_SI5351_TX_FSQ_COUNT
    label: "FSQ Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_fsq"
    validation:
      min: 1
      max: 50

  tx_ft8:
    define: RADIO_SI5351_TX_FT8
    label: "Enable FT8"
    type: bool
    default: false
    tier: advanced

  tx_ft8_count:
    define: RADIO_SI5351_TX_FT8_COUNT
    label: "FT8 Repeat Count"
    type: integer
    default: 1
    tier: advanced
    visible_when: "radio_si5351.tx_ft8"
    validation:
      min: 1
      max: 50

  # --- Si5351 Frequencies ---
  frequency_cw:
    define: RADIO_SI5351_TX_FREQUENCY_CW
    label: "CW HF Frequency (Hz)"
    type: frequency
    suffix: "UL"
    default: 3595000
    tier: advanced
    visible_when: "radio_si5351.tx_cw"
    validation:
      min: 1000000
      max: 225000000

  frequency_pip:
    define: RADIO_SI5351_TX_FREQUENCY_PIP
    label: "Pip HF Frequency (Hz)"
    type: frequency
    suffix: "UL"
    default: 3595000
    tier: advanced
    visible_when: "radio_si5351.tx_pip"
    validation:
      min: 1000000
      max: 225000000

  frequency_horus_v2:
    define: RADIO_SI5351_TX_FREQUENCY_HORUS_V2
    label: "Horus V2 HF Frequency (Hz)"
    type: frequency
    suffix: "UL"
    default: 3608000
    tier: advanced
    visible_when: "radio_si5351.tx_horus_v2"
    validation:
      min: 1000000
      max: 225000000

