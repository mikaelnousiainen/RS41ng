# ------------------------------------------------------------------------------
# GPS Settings
# ------------------------------------------------------------------------------
gps:
  _section: "GPS"
  _description: "GPS receiver configuration"
  _tier: advanced
  _order: 14

  leap_seconds:
    define: GPS_TIME_LEAP_SECONDS
    label: "GPS Leap Seconds"
    description: "Leap seconds to add to raw GPS time. Overridden if GPS data includes leap second info."
    type: integer
    default: 18
    tier: advanced
    validation:
      min: 0
      max: 30

  require_3d_fix:
    define: GPS_REQUIRE_3D_FIX
    label: "Require 3D Fix"
    description: "Require altitude fix (3D). Enable for airborne use."
    type: bool
    default: true
    tier: advanced

  power_saving_enable:
    define: GPS_POWER_SAVING_ENABLE
    label: "GPS Power Saving"
    description: >
      Selective power saving mode. Reduces consumption by ~30-40 mA.
      Automatically exits low-power when fix is lost.
      Only activates after first good fix. Not necessary for short flights (< 6 hours).
      WARNING: NOT recommended for RSM4x4-series PCBs -- the u-blox M10050 does not
      properly enter a power-saving tracking state, so no power savings are realized.
    type: bool
    default: false
    tier: advanced

  nmea_output_enable:
    define: GPS_NMEA_OUTPUT_VIA_SERIAL_PORT_ENABLE
    label: "NMEA Output via Serial"
    description: >
      Enable NMEA output from GPS via external serial port.
      On RS41, uses USART3 (PB10/PB11) which shares pins with I2C bus (Si5351 and sensors).
      On DFM17, can use USART1 or USART3 (see DFM17 USART Port setting).
      WARNING on RS41: Disables I2C bus (Si5351, BMP280, RadSens).
    type: bool
    default: false
    tier: advanced

  dynamic_model:
    define: GPS_DYNAMIC_MODEL
    label: "Dynamic Platform Model"
    description: "GPS dynamic model for filtering. Use 6 (Airborne <1g) for high-altitude balloons."
    type: enum_constant
    values:
      - { value: 0, label: "0 - Portable" }
      - { value: 2, label: "2 - Stationary" }
      - { value: 3, label: "3 - Pedestrian" }
      - { value: 4, label: "4 - Automotive" }
      - { value: 5, label: "5 - Sea" }
      - { value: 6, label: "6 - Airborne <1g (recommended for balloons)" }
      - { value: 7, label: "7 - Airborne <2g" }
      - { value: 8, label: "8 - Airborne <4g" }
    default: 6
    tier: advanced

  position_fixing_mode:
    define: GPS_POSITION_FIXING_MODE
    label: "Position Fixing Mode"
    description: "GPS fix mode. Use 3D only for airborne use."
    type: enum_constant
    values:
      - { value: 1, label: "1 - 2D only" }
      - { value: 2, label: "2 - 3D only (recommended)" }
      - { value: 3, label: "3 - Auto 2D/3D" }
    default: 2
    tier: advanced

  measurement_rate:
    define: GPS_MEASUREMENT_RATE
    label: "Measurement Rate (ms)"
    description: >
      GPS measurement interval. UBX-G6010 supports down to 200ms (5 Hz). 1000ms recommended.
      RSM4x4 platform does not seem to accept values above 1000.
    type: integer
    default: 1000
    tier: advanced
    validation:
      min: 200
      max: 10000

  position_message_rate:
    define: GPS_POSITION_MESSAGE_RATE
    label: "Position Message Rate"
    description: "Messages per measurement. 1 = every measurement, 5 = every 5th."
    type: integer
    default: 1
    tier: advanced
    validation:
      min: 1
      max: 60

  time_message_rate:
    define: GPS_TIME_MESSAGE_RATE
    label: "Time Message Rate"
    description: "Time messages per measurement. 1 = every measurement."
    type: integer
    default: 1
    tier: advanced
    validation:
      min: 1
      max: 60

# ------------------------------------------------------------------------------
# I2C & Sensors (RS41 only)
# ------------------------------------------------------------------------------
sensors:
  _section: "I2C & Sensors"
  _description: "External I2C sensors and peripherals (RS41 / RS41_RSM4x4 only)"
  _tier: advanced
  _order: 15
  _visible_when: "hardware.type == 'RS41' || hardware.type == 'RS41_RSM4x4'"

  i2c_bus_clock_speed:
    define: I2C_BUS_CLOCK_SPEED
    label: "I2C Bus Clock Speed (Hz)"
    description: "100000 (100 kHz) for Si5351. Some BMP280 sensors may need 10000 (10 kHz). Old RS41 only."
    type: integer
    default: 100000
    tier: advanced
    visible_when: "hardware.type == 'RS41'"
    validation:
      min: 10000
      max: 400000

  i2c_bus_timing:
    define: I2C_BUS_TIMING
    label: "I2C Bus Timing Register"
    description: >
      STM32L4 I2C timing configuration for RSM4x4 series.
      0x20422727 = 100 kHz, 0x9044A747 = 10 kHz.
    type: hex
    default: "0x20422727"
    tier: advanced
    visible_when: "hardware.type == 'RS41_RSM4x4'"

  bmp280_enable:
    define: SENSOR_BMP280_ENABLE
    label: "Enable BMP280/BME280 Sensor"
    description: "External I2C atmospheric sensor. BME280 also reports humidity."
    type: bool
    default: false
    tier: advanced

  bmp280_i2c_address:
    define: SENSOR_BMP280_I2C_ADDRESS
    label: "BMP280 I2C Address"
    description: "Usually 0x76 or 0x77"
    type: hex
    default: "0x77"
    tier: advanced
    visible_when: "sensors.bmp280_enable"

  bme68x_enable:
    define: SENSOR_BME68X_ENABLE
    label: "Enable BME680/688 Sensor"
    description: "External I2C BME680/688 atmospheric sensor with gas measurement"
    type: bool
    default: false
    tier: advanced

  bme68x_i2c_address:
    define: SENSOR_BME68X_I2C_ADDRESS
    label: "BME68x I2C Address"
    description: "Usually 0x76 or 0x77"
    type: hex
    default: "0x77"
    tier: advanced
    visible_when: "sensors.bme68x_enable"

  bme690_enable:
    define: SENSOR_BME690_ENABLE
    label: "Enable BME690 Sensor"
    description: "External I2C BME690 atmospheric sensor with gas measurement"
    type: bool
    default: false
    tier: advanced

  bme690_i2c_address:
    define: SENSOR_BME690_I2C_ADDRESS
    label: "BME690 I2C Address"
    description: "Usually 0x76 or 0x77"
    type: hex
    default: "0x77"
    tier: advanced
    visible_when: "sensors.bme690_enable"

  gas_measurement:
    define: SENSOR_BME_6XX_GAS_MEASUREMENT
    label: "Enable Gas Measurement"
    description: "Enable gas resistance measurement on BME680/688/690"
    type: bool
    default: false
    tier: advanced
    visible_when: "sensors.bme68x_enable || sensors.bme690_enable"

  gas_heater_duration:
    define: SENSOR_BME_6XX_GAS_HEATER_DURATION
    label: "Gas Heater Duration (ms)"
    description: "Gas heater duration in milliseconds"
    type: integer
    default: 100
    tier: advanced
    visible_when: "sensors.gas_measurement"
    validation:
      min: 1
      max: 4032

  gas_heater_temp:
    define: SENSOR_BME_6XX_GAS_HEATER_TEMP
    label: "Gas Heater Temperature (C)"
    description: "Gas heater temperature in degrees Celsius"
    type: integer
    default: 300
    tier: advanced
    visible_when: "sensors.gas_measurement"
    validation:
      min: 200
      max: 400

  radsens_enable:
    define: SENSOR_RADSENS_ENABLE
    label: "Enable RadSens Radiation Sensor"
    description: "External I2C RadSens radiation sensor"
    type: bool
    default: false
    tier: advanced

  radsens_chip_id:
    define: SENSOR_RADSENS_CHIP_ID
    label: "RadSens Chip ID"
    description: "Expected chip ID for verification. Default 0x7D."
    type: hex
    default: "0x7D"
    tier: advanced
    visible_when: "sensors.radsens_enable"

  radsens_i2c_address:
    define: SENSOR_RADSENS_I2C_ADDRESS
    label: "RadSens I2C Address"
    description: "Default 0x66"
    type: hex
    default: "0x66"
    tier: advanced
    visible_when: "sensors.radsens_enable"

  radsens_sensitivity:
    define: SENSOR_RADSENS_SENSITIVITY
    label: "RadSens Sensitivity (imp/MKR)"
    description: "Stored in non-volatile memory. Default 105."
    type: integer
    default: 105
    tier: advanced
    visible_when: "sensors.radsens_enable"
    validation:
      min: 1
      max: 65535

  si5351_enable:
    define: RADIO_SI5351_ENABLE
    label: "Enable Si5351 HF Radio"
    description: "External I2C Si5351 clock generator for HF transmissions (WSPR, FT8, JT modes)"
    type: bool
    default: false
    tier: advanced

  pulse_counter_enable:
    define: PULSE_COUNTER_ENABLE
    label: "Enable Pulse Counter"
    description: >
      Pulse counting via expansion header pin (e.g. Geiger counter).
      WARNING: Disables I2C bus and serial port. Adds pulse count to Horus data.
    type: bool
    default: false
    tier: advanced

  pulse_counter_pin_mode:
    define: PULSE_COUNTER_PIN_MODE
    label: "Pulse Counter Pin Mode"
    description: "Internal pull-up/down resistor on expansion header pin. Set floating if external circuit has its own."
    type: enum_constant
    enum_defines:
      - { define: "PULSE_COUNTER_PIN_MODE_FLOATING", value: 0 }
      - { define: "PULSE_COUNTER_PIN_MODE_INTERNAL_PULL_UP", value: 1 }
      - { define: "PULSE_COUNTER_PIN_MODE_INTERNAL_PULL_DOWN", value: 2 }
    values:
      - { value: "PULSE_COUNTER_PIN_MODE_FLOATING", label: "Floating" }
      - { value: "PULSE_COUNTER_PIN_MODE_INTERNAL_PULL_UP", label: "Internal Pull-up" }
      - { value: "PULSE_COUNTER_PIN_MODE_INTERNAL_PULL_DOWN", label: "Internal Pull-down" }
    default: "PULSE_COUNTER_PIN_MODE_INTERNAL_PULL_UP"
    tier: advanced
    visible_when: "sensors.pulse_counter_enable"

  pulse_counter_interrupt_edge:
    define: PULSE_COUNTER_INTERRUPT_EDGE
    label: "Pulse Counter Interrupt Edge"
    description: "Trigger on falling or rising edge of pulse"
    type: enum_constant
    enum_defines:
      - { define: "PULSE_COUNTER_INTERRUPT_EDGE_FALLING", value: 1 }
      - { define: "PULSE_COUNTER_INTERRUPT_EDGE_RISING", value: 2 }
    values:
      - { value: "PULSE_COUNTER_INTERRUPT_EDGE_FALLING", label: "Falling Edge" }
      - { value: "PULSE_COUNTER_INTERRUPT_EDGE_RISING", label: "Rising Edge" }
    default: "PULSE_COUNTER_INTERRUPT_EDGE_FALLING"
    tier: advanced
    visible_when: "sensors.pulse_counter_enable"

# ------------------------------------------------------------------------------
