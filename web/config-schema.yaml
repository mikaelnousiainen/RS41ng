  - { var: "$ti", description: "Internal temperature in C (up to 3 chars)" }
  - { var: "$hu", description: "Humidity % (up to 3 chars)" }
  - { var: "$pr", description: "Pressure in mbar (up to 4 chars)" }
  - { var: "$tow", description: "GPS time of week in ms" }
  - { var: "$hh", description: "Current hour (2 chars)" }
  - { var: "$mm", description: "Current minute (2 chars)" }
  - { var: "$ss", description: "Current second (2 chars)" }
  - { var: "$sv", description: "GPS satellites visible (up to 2 chars)" }
  - { var: "$lat", description: "Latitude in degrees * 1000 (up to 6 chars)" }
  - { var: "$lon", description: "Longitude in degrees * 1000 (up to 6 chars)" }
  - { var: "$alt", description: "Altitude in meters (up to 5 chars)" }
  - { var: "$gs", description: "Ground speed in km/h (up to 3 chars)" }
