# ------------------------------------------------------------------------------
# APRS Settings
# ------------------------------------------------------------------------------
aprs:
  _section: "APRS"
  _description: "APRS mode configuration"
  _tier: intermediate
  _order: 7
  _visible_when: "tx_modes.radio_tx_aprs || tx_modes.radio_tx_aprs_9600"

  # --- APRS-specific settings ---
  callsign:
    define: APRS_CALLSIGN
    label: "APRS Call Sign"
    description: "Defaults to global call sign"
    type: string
    alias_of: "global.callsign"
    tier: intermediate

  ssid:
    define: APRS_SSID
    label: "APRS SSID"
    description: >
      0=fixed station, 1-4=generic, 5=other networks, 6=satellite ops,
      7=walkie-talkie, 8=boats/RV, 9=primary mobile, A=internet,
      B=balloons/aircraft, C=RFID/trackers, D=weather, E=truckers, F=generic
    type: char
    default: "B"
    tier: simple
    validation:
      pattern: "^[0-9A-F]$"

  symbol_table:
    define: APRS_SYMBOL_TABLE
    label: "Symbol Table"
    description: "'/' = primary table, '\\\\' = alternate table"
    type: char
    default: "/"
    tier: intermediate

  symbol:
    define: APRS_SYMBOL
    label: "Symbol Character"
    description: "APRS symbol code. 'O' = balloon. See aprs.org/symbols/symbolsX.txt"
    type: char
    default: "O"
    tier: intermediate

  comment:
    define: APRS_COMMENT
    label: "APRS Comment"
    description: "Comment string included in APRS packets. Keep under 100 characters."
    type: string
    default: "https://amateur.sondehub.org/"
    tier: intermediate
    validation:
      max_length: 127

  relays:
    define: APRS_RELAYS
    label: "APRS Relays (Digipeater Path)"
    description: "No spaces. Highly discouraged for balloons."
    type: string
    default: ""
    tier: intermediate
    validation:
      max_length: 40

  destination:
    define: APRS_DESTINATION
    label: "APRS Destination"
    description: "APRS destination address. APZ41N = experimental RS41ng."
    type: string
    default: "APZ41N"
    tier: intermediate
    validation:
      max_length: 6

  destination_ssid:
    define: APRS_DESTINATION_SSID
    label: "Destination SSID"
    type: char
    default: "0"
    tier: intermediate

  weather_report_enable:
    define: APRS_WEATHER_REPORT_ENABLE
    label: "Weather Report Mode"
    description: "Generate weather report instead of position report. Overrides APRS symbol."
    type: bool
    default: false
    tier: intermediate

  time_sync_seconds:
    define: APRS_TIME_SYNC_SECONDS
    label: "APRS 1200 Time Sync Interval (s)"
    description: "Transmit every N seconds from top of hour. 0 = no time sync."
    type: integer
    default: 0
    tier: intermediate
    visible_when: "tx_modes.radio_tx_aprs"
    validation:
      min: 0
      max: 3600

  time_sync_offset_seconds:
    define: APRS_TIME_SYNC_OFFSET_SECONDS
    label: "APRS 1200 Time Sync Offset (s)"
    description: "Delay from scheduled time"
    type: integer
    default: 0
    tier: intermediate
    visible_when: "tx_modes.radio_tx_aprs"
    validation:
      min: 0
      max: 3600

  aprs_9600_time_sync_seconds:
    define: APRS_9600_TIME_SYNC_SECONDS
    label: "APRS 9600 Time Sync Interval (s)"
    description: "Transmit every N seconds from top of hour. 0 = no time sync."
    type: integer
    default: 0
    tier: intermediate
    visible_when: "tx_modes.radio_tx_aprs_9600"
    validation:
      min: 0
      max: 3600

  aprs_9600_time_sync_offset_seconds:
    define: APRS_9600_TIME_SYNC_OFFSET_SECONDS
    label: "APRS 9600 Time Sync Offset (s)"
    description: "Delay from scheduled time"
    type: integer
    default: 0
    tier: intermediate
    visible_when: "tx_modes.radio_tx_aprs_9600"
    validation:
      min: 0
      max: 3600

  # --- Message template ---
  messages:
    define: aprs_comment_templates
    label: "APRS Comment Messages"
    description: "APRS comment field. Keep under 100 characters. Supports template variables."
    type: string_array
    file: config.c
    template_vars: true
    default:
      - "RS41ng radiosonde firmware"
    tier: simple
    validation:
      max_item_length: 127

