wspr:
  _section: "WSPR"
  _description: "WSPR mode configuration (Si5351 only)"
  _tier: advanced
  _order: 16
  _visible_when: "radio_si5351.tx_wspr"

  # --- WSPR-specific settings ---
  callsign:
    define: WSPR_CALLSIGN
    label: "WSPR Call Sign"
    description: "Defaults to global call sign"
    type: string
    alias_of: "global.callsign"
    tier: advanced

  locator_fixed_enabled:
    define: WSPR_LOCATOR_FIXED_ENABLED
    label: "Use Fixed Locator"
    description: "Use a fixed locator instead of GPS-derived"
    type: bool
    default: false
    tier: advanced

  locator_fixed:
    define: WSPR_LOCATOR_FIXED
    label: "Fixed Locator"
    description: "4-character Maidenhead grid locator"
    type: string
    default: "AA00"
    tier: advanced
    visible_when: "wspr.locator_fixed_enabled"
    validation:
      max_length: 4
